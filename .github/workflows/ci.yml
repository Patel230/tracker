name: tracker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Tests
        run: npm test
      # typecheck and tests both pass on a tree that fails to bundle, so main
      # could break the deploy without CI noticing.
      - name: Build
        run: npm run build

  # Deploy only on pushes to main (PRs build+test in the ci job but don't ship).
  # Migrations stay manual: the deploy-prerequisites memory pins JWT_SECRET +
  # the token_version migration as things an operator must apply deliberately,
  # so this job deploys the Worker only — it never runs db:migrate:remote.
  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
